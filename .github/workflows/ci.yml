name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        # `nmap` is the binary that python-nmap shells out to; conftest fixtures
        # touch the scanner at import time so it must be present.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nmap

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-timeout
          pip install -r requirements.txt

      # Cheap syntax check: parses every .py file. This is the gate that would
      # have caught the literal-`\n` corruption of services/resource_monitor.py.
      - name: Check Python syntax
        run: |
          python - <<'PY'
          import ast, glob, sys
          errors = []
          for p in glob.glob('**/*.py', recursive=True):
              if any(skip in p for skip in ('venv/', '__pycache__/', 'node_modules/')):
                  continue
              try:
                  ast.parse(open(p, encoding='utf-8', errors='replace').read())
              except SyntaxError as e:
                  errors.append(f"{p}: {e}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f"All Python files parsed cleanly")
          PY

      - name: Ruff lint
        run: ruff check .

      # Run the full unit suite. tests/conftest.py:STALE_TEST_SKIPS holds a
      # centralized list of tests that were written for APIs that have since
      # been renamed/removed; each entry has a reason. To revive a skipped
      # test, refactor it to match the current API and remove its entry from
      # the dict. The skips amount to ~85 tests as of Phase 4c triage.
      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-not-for-production-use
          NETWORK_RANGE: "192.168.1.0/24"
        run: |
          pytest tests/unit \
            --no-cov \
            --timeout=15 \
            -q \
            --tb=short
